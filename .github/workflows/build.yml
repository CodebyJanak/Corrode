name: Build Corrode Browser

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 18 }
      - run: npm install
      - run: npx vite build && npx electron-builder --win
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          AI_PROVIDER: groq
      - uses: actions/upload-artifact@v4
        with:
          name: Corrode-Windows
          path: release/desktop/*.exe
          if-no-files-found: warn

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 18 }
      - run: npm install
      - run: npx vite build && npx electron-builder --mac
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          AI_PROVIDER: groq
      - uses: actions/upload-artifact@v4
        with:
          name: Corrode-Mac
          path: release/desktop/*.dmg
          if-no-files-found: warn

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 18 }
      - run: npm install
      - run: npx vite build && npx electron-builder --linux
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          AI_PROVIDER: groq
      - uses: actions/upload-artifact@v4
        with:
          name: Corrode-Linux
          path: release/desktop/*.AppImage
          if-no-files-found: warn

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 18 }
      - uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
      - uses: android-actions/setup-android@v3
      - run: npm install
      - run: npx vite build
      - run: npx cap add android || true
      - run: npx cap sync android
      - name: Build APK
        working-directory: android
        run: chmod +x ./gradlew && ./gradlew assembleDebug
      - uses: actions/upload-artifact@v4
        with:
          name: Corrode-Android-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: warn
